spring.application.name=api-gateway
server.port=8080

kafka.broker=${KAFKA_BROKER:kafka:29092}
schema.registry.url=${SCHEMA_REGISTRY_URL:http://schema-registry:8081}

spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

spring.datasource.url=jdbc:postgresql://${DB_HOST:timescaledb}:${DB_PORT:5432}/${DB_NAME:ttc_intelligence}
spring.datasource.username=${DB_USER:ttc}
spring.datasource.password=${DB_PASSWORD:ttc}
